<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>givezj8.cn · 后台词条编辑</title>
  <style>
    body { margin:0; min-height:100vh; font-family:"Avenir Next","PingFang SC",sans-serif; background:#f7f3ef; color:#231810; }
    .shell { max-width:960px; margin:0 auto; padding:28px 20px 64px; }
    .toolbar { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; }
    .link, input, select, textarea, button {
      font:inherit; padding:12px 14px; border-radius:16px; border:1px solid rgba(35,24,16,0.12);
      background:#fff; color:#231810;
    }
    .link { text-decoration:none; color:#69584b; }
    button { cursor:pointer; }
    .primary { background:#9d4e1d; color:#fff; border:0; }
    .card { background:#fff; border:1px solid rgba(35,24,16,0.08); border-radius:26px; padding:24px; box-shadow:0 18px 40px rgba(35,24,16,0.08); margin-top:18px; }
    form { display:grid; gap:14px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    label { display:grid; gap:8px; font-size:12px; color:#7a685d; text-transform:uppercase; letter-spacing:.08em; font-weight:700; }
    textarea { min-height:120px; resize:vertical; }
    @media (max-width: 860px) { .grid-2 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div>
        <div style="color:#7a685d;">givezj8.cn / admin</div>
        <h1 id="title" style="margin:8px 0 0; font-size:52px; letter-spacing:-.05em;">新增词条</h1>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="link" href="/admin">后台首页</a>
        <a class="link" href="/admin/keywords">返回列表</a>
      </div>
    </div>

    <section class="card">
      <form id="seed-form">
        <div class="grid-2">
          <label>类别
            <select id="category">
              <option value="cpu">cpu</option>
              <option value="gpu">gpu</option>
              <option value="motherboard">motherboard</option>
              <option value="ram">ram</option>
              <option value="ssd">ssd</option>
              <option value="psu">psu</option>
              <option value="case">case</option>
              <option value="cooler">cooler</option>
            </select>
          </label>
          <label>品牌
            <input id="brand" placeholder="AMD / NVIDIA / Intel">
          </label>
        </div>
        <label>关键词
          <input id="keyword" required>
        </label>
        <label>标准型号
          <input id="canonical_model" required>
        </label>
        <div class="grid-2">
          <label>别名
            <input id="aliases" placeholder="逗号分隔">
          </label>
          <label>优先级
            <input id="priority" type="number" value="100">
          </label>
        </div>
        <div class="grid-2">
          <label>启用状态
            <select id="enabled">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label>词条 ID
            <input id="seed-id" disabled>
          </label>
        </div>
        <label>备注
          <textarea id="notes"></textarea>
        </label>
        <button class="primary" type="submit">保存词条</button>
      </form>
      <p id="status" style="color:#7a685d;">等待提交</p>
    </section>
  </div>
  <script>
    const match = location.pathname.match(/^\/admin\/keywords\/([^/]+)\/edit$/);
    const editId = match ? match[1] : '';
    if (editId) {
      document.getElementById('title').textContent = '编辑词条';
      document.getElementById('seed-id').value = editId;
      fetch(`/admin/api/v1/keyword-seeds/${editId}`).then(async (res) => {
        if (!res.ok) return;
        const item = await res.json();
        ['category', 'brand', 'keyword', 'canonical_model', 'notes'].forEach((id) => {
          if (item[id] !== undefined) document.getElementById(id).value = item[id];
        });
        document.getElementById('aliases').value = (item.aliases || []).join(',');
        document.getElementById('priority').value = item.priority || 100;
        document.getElementById('enabled').value = String(item.enabled);
      });
    }

    document.getElementById('seed-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = {
        category: document.getElementById('category').value,
        brand: document.getElementById('brand').value.trim(),
        keyword: document.getElementById('keyword').value.trim(),
        canonical_model: document.getElementById('canonical_model').value.trim(),
        aliases: (document.getElementById('aliases').value || '').split(',').map((item) => item.trim()).filter(Boolean),
        priority: Number(document.getElementById('priority').value || 100),
        enabled: document.getElementById('enabled').value === 'true',
        notes: document.getElementById('notes').value.trim()
      };
      const res = await fetch(editId ? `/admin/api/v1/keyword-seeds/${editId}` : '/admin/api/v1/keyword-seeds', {
        method: editId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      document.getElementById('status').textContent = res.ok ? `已保存 ${data.id}` : (data.error || '保存失败');
      if (res.ok && !editId) {
        window.location.href = `/admin/keywords/${data.id}/edit`;
      }
    });
  </script>
</body>
</html>
