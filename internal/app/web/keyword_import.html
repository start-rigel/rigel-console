<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>givezj8.cn · 后台 Excel 导入</title>
  <style>
    body { margin:0; min-height:100vh; font-family:"Avenir Next","PingFang SC",sans-serif; background:#edf2f6; color:#19222b; }
    .shell { max-width:1100px; margin:0 auto; padding:28px 20px 64px; }
    .toolbar { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; }
    .layout { display:grid; grid-template-columns: 1fr 0.9fr; gap:18px; margin-top:18px; }
    .card { background:#fff; border:1px solid rgba(25,34,43,0.08); border-radius:24px; padding:24px; box-shadow:0 18px 40px rgba(25,34,43,0.08); }
    .link, button, input {
      font:inherit; padding:12px 14px; border-radius:16px; border:1px solid rgba(25,34,43,0.12);
      background:#fff; color:#22303a; text-decoration:none;
    }
    button { cursor:pointer; }
    .primary { background:#27597a; color:#fff; border:0; }
    .drop { border:1.5px dashed rgba(39,89,122,0.32); border-radius:22px; padding:28px; background:rgba(39,89,122,0.04); }
    pre { white-space:pre-wrap; word-break:break-word; color:#647381; }
    @media (max-width: 920px) { .layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div>
        <div style="color:#647381;">givezj8.cn / admin</div>
        <h1 style="margin:8px 0 0; font-size:52px; letter-spacing:-.05em;">Excel 导入</h1>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="link" href="/admin">后台首页</a>
        <a class="link" href="/admin/keywords">词库列表</a>
      </div>
    </div>

    <div class="layout">
      <section class="card">
        <h2 style="margin:0 0 12px;">上传工作簿</h2>
        <p style="color:#647381; line-height:1.7;">支持下载模板并上传 `.xlsx` 文件。当前后端会直接解析工作簿第一张表并按共享文档字段校验。</p>
        <div class="drop">
          <input id="file-input" type="file" accept=".xlsx">
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;">
          <a class="link" href="/admin/api/v1/keyword-seeds/template">下载模板</a>
          <button class="primary" id="upload-btn" type="button">开始导入</button>
        </div>
      </section>

      <aside class="card">
        <h2 style="margin:0 0 12px;">导入结果</h2>
        <pre id="result">等待上传</pre>
      </aside>
    </div>
  </div>
  <script>
    document.getElementById('upload-btn').addEventListener('click', async () => {
      const input = document.getElementById('file-input');
      if (!input.files.length) {
        document.getElementById('result').textContent = '请选择文件';
        return;
      }
      const formData = new FormData();
      formData.append('file', input.files[0]);
      const res = await fetch('/admin/api/v1/keyword-seeds/import', { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
