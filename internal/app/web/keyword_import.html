<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rigel Console · Excel 导入</title>
  <style>
    :root {
      --paper: #f5efe3;
      --ink: #1d252b;
      --muted: #63717b;
      --accent: #b24d2c;
      --line: rgba(29,37,43,0.12);
      --panel: rgba(255,255,255,0.86);
      --shadow: 0 24px 60px rgba(29,37,43,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top center, rgba(178,77,44,0.12), transparent 34%),
        linear-gradient(180deg, #efe6d5, var(--paper));
      font-family: Georgia, "Songti SC", serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .shell { max-width: 980px; margin: 0 auto; padding: 28px 20px 52px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
    .topbar h1 { margin: 0; font-size: clamp(30px, 4vw, 54px); letter-spacing: -0.04em; }
    .topbar p { margin: 6px 0 0; color: var(--muted); }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav a, .button {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.72);
      font: inherit;
      cursor: pointer;
    }
    .button.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
    .layout { display: grid; grid-template-columns: 1fr 0.9fr; gap: 18px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 24px;
    }
    .section-title { margin: 0 0 12px; font-size: 22px; }
    .hint { color: var(--muted); font-size: 14px; line-height: 1.7; }
    .dropzone {
      margin-top: 18px;
      border: 1.5px dashed var(--line);
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      background: rgba(255,255,255,0.65);
    }
    .dropzone input { margin-top: 12px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
    .stat { border: 1px solid var(--line); border-radius: 18px; padding: 16px; background: rgba(255,255,255,0.72); }
    .stat strong { display: block; font-size: 28px; }
    .errors { margin-top: 16px; display: grid; gap: 10px; }
    .error-item { border-top: 1px solid var(--line); padding-top: 10px; color: var(--muted); }
    .footer { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .topbar { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <h1>Excel 导入</h1>
        <p>这里对应文档里的 `/keywords/import` 页面，只负责上传模板、查看导入结果和错误明细。</p>
      </div>
      <nav class="nav">
        <a href="/">推荐首页</a>
        <a href="/keywords">词库列表</a>
        <a href="/keywords/new">新增词条</a>
      </nav>
    </div>

    <div class="layout">
      <section class="panel">
        <h2 class="section-title">导入操作</h2>
        <p class="hint">业务侧批量导入只支持 Excel。当前页面会调用 `POST /api/v1/keyword-seeds/import`，模板下载走 `GET /api/v1/keyword-seeds/template`。</p>
        <div class="dropzone">
          <strong>拖入 Excel 或直接选择文件</strong>
          <p class="hint">建议文件名：`keyword_seeds.xlsx`</p>
          <input id="file-input" type="file" accept=".xlsx,.xls">
        </div>
        <div class="footer">
          <a class="button" href="/api/v1/keyword-seeds/template">下载模板</a>
          <button class="button primary" id="upload-btn" type="button">开始导入</button>
        </div>
      </section>

      <aside class="panel">
        <h2 class="section-title">导入结果</h2>
        <div class="stats">
          <div class="stat"><span class="hint">Job ID</span><strong id="job-id">—</strong></div>
          <div class="stat"><span class="hint">Imported</span><strong id="imported-count">0</strong></div>
          <div class="stat"><span class="hint">Failed</span><strong id="failed-count">0</strong></div>
          <div class="stat"><span class="hint">Status</span><strong id="result-status">Idle</strong></div>
        </div>
        <div class="errors" id="error-list">
          <div class="hint">错误明细会显示在这里。</div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const jobIdEl = document.getElementById('job-id');
    const importedCountEl = document.getElementById('imported-count');
    const failedCountEl = document.getElementById('failed-count');
    const resultStatusEl = document.getElementById('result-status');
    const errorListEl = document.getElementById('error-list');

    function renderErrors(errors) {
      if (!errors || errors.length === 0) {
        errorListEl.innerHTML = '<div class="hint">当前没有错误明细。</div>';
        return;
      }
      errorListEl.innerHTML = errors.map((item) => `
        <div class="error-item">
          <strong>第 ${item.row} 行</strong>
          <div>${item.message}</div>
        </div>
      `).join('');
    }

    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        resultStatusEl.textContent = '请选择文件';
        return;
      }
      const formData = new FormData();
      formData.append('file', file);
      resultStatusEl.textContent = 'Uploading';
      try {
        const res = await fetch('/api/v1/keyword-seeds/import', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '导入失败');
        jobIdEl.textContent = data.job_id || '—';
        importedCountEl.textContent = data.imported_count ?? 0;
        failedCountEl.textContent = data.failed_count ?? 0;
        resultStatusEl.textContent = 'Done';
        renderErrors(data.errors || []);
      } catch (error) {
        resultStatusEl.textContent = error.message;
        renderErrors([]);
      }
    });
  </script>
</body>
</html>
