<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>givezj8.cn · 后台管理</title>
  <style>
    body { margin:0; min-height:100vh; font-family:"Avenir Next","PingFang SC",sans-serif; background:#f3f4f7; color:#172028; }
    .shell { max-width:1080px; margin:0 auto; padding:32px 20px 64px; }
    .hero, .cards { display:grid; gap:18px; }
    .cards { grid-template-columns: repeat(3, 1fr); }
    .card { background:#fff; border:1px solid rgba(23,32,40,0.08); border-radius:24px; padding:24px; box-shadow:0 18px 40px rgba(23,32,40,0.08); }
    .toolbar { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .link, button { display:inline-flex; align-items:center; justify-content:center; padding:12px 16px; border-radius:999px; border:1px solid rgba(23,32,40,0.1); background:#fff; color:#42505b; text-decoration:none; font:inherit; cursor:pointer; }
    h1 { margin:0; font-size:56px; letter-spacing:-.05em; }
    p { color:#65727d; line-height:1.7; }
    @media (max-width: 900px) { .cards { grid-template-columns: 1fr; } h1 { font-size:42px; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <a class="link" href="/">前台推荐页</a>
      <button id="logout-btn" type="button">退出登录</button>
    </div>
    <section class="hero">
      <div class="card">
        <div>givezj8.cn / admin</div>
        <h1>管理页</h1>
        <p>这里承载后台能力。当前第一版已经拆出独立入口，词库维护、导入导出和后续采集操作不再和前台匿名推荐混在同一页面体系里。</p>
      </div>
    </section>
    <section class="cards">
      <a class="card" href="/admin/keywords">
        <strong>词库列表</strong>
        <p>查看、筛选、启停现有 keyword seeds。</p>
      </a>
      <a class="card" href="/admin/keywords/new">
        <strong>新增词条</strong>
        <p>手动补充主流型号和别名。</p>
      </a>
      <a class="card" href="/admin/keywords/import">
        <strong>Excel 导入</strong>
        <p>下载模板、上传工作簿、查看导入结果。</p>
      </a>
    </section>
  </div>
  <script>
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/admin/logout', { method: 'POST' });
      window.location.href = '/admin/login';
    });
  </script>
</body>
</html>
