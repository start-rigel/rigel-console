<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rigel Console · 型号词库</title>
  <style>
    :root {
      --bg: #e8eef2;
      --bg-grid: rgba(39, 91, 122, 0.09);
      --panel: rgba(255,255,255,0.80);
      --panel-strong: rgba(255,255,255,0.92);
      --ink: #0f1b24;
      --muted: #587082;
      --line: rgba(15, 27, 36, 0.12);
      --accent: #1293d1;
      --accent-soft: rgba(18,147,209,0.14);
      --accent-strong: #086fa1;
      --shadow: 0 24px 64px rgba(14, 35, 50, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
      background:
        linear-gradient(var(--bg-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px),
        radial-gradient(circle at top right, rgba(18,147,209,0.16), transparent 28%),
        linear-gradient(180deg, #eef4f7, var(--bg));
      background-size: 28px 28px, 28px 28px, auto, auto;
    }
    a { color: inherit; text-decoration: none; }
    .shell { max-width: 1260px; margin: 0 auto; padding: 28px 20px 56px; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .nav a {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.64);
      color: var(--muted);
      transition: .18s ease;
    }
    .nav a:hover, .nav a.active {
      background: rgba(18,147,209,0.12);
      color: var(--ink);
      border-color: rgba(18,147,209,0.32);
    }
    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .brand h1 { margin: 0; font-size: clamp(34px, 5vw, 64px); letter-spacing: -0.05em; }
    .brand p { margin: 8px 0 0; color: var(--muted); max-width: 560px; line-height: 1.7; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .panel-strong { background: var(--panel-strong); }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 18px; }
    .panel-inner { padding: 22px; }
    .section-title { margin: 0 0 14px; font-size: 20px; letter-spacing: -0.03em; }
    .field { display: grid; gap: 8px; margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
    input, select, .button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      background: rgba(255,255,255,0.78);
      color: var(--ink);
      font: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: rgba(18,147,209,0.45);
      box-shadow: 0 0 0 4px rgba(18,147,209,0.10);
    }
    .button {
      cursor: pointer;
      background: rgba(255,255,255,0.72);
    }
    .button.primary {
      background: linear-gradient(135deg, var(--accent-strong), var(--accent));
      border-color: transparent;
      color: #fff;
      font-weight: 700;
    }
    .button.ghost { background: rgba(255,255,255,0.72); }
    .button.small { width: auto; padding: 9px 12px; font-size: 13px; }
    .table-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 0 12px;
    }
    tbody td {
      padding: 16px 0;
      border-top: 1px solid var(--line);
      vertical-align: top;
    }
    .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12px; color: var(--muted); }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .hint { color: var(--muted); font-size: 14px; line-height: 1.6; }
    .empty { color: var(--muted); padding: 26px 0; }
    .status { margin-top: 14px; color: var(--muted); font-size: 14px; }
    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .table-header { flex-direction: column; }
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tbody tr { border-top: 1px solid var(--line); padding: 16px 0; display: grid; gap: 6px; }
      tbody td { border-top: 0; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <a href="/">推荐首页</a>
      <a class="active" href="/keywords">词库列表</a>
      <a href="/keywords/new">新增词条</a>
      <a href="/keywords/import">Excel 导入</a>
    </nav>

    <div class="topbar">
      <div class="brand">
        <h1>Keyword Matrix</h1>
        <p>这里维护 JD 搜索使用的主流型号词库。第一版只解决筛选、启停、导入导出和基础编辑，不做复杂运营后台。</p>
      </div>
    </div>

    <div class="grid">
      <aside class="panel panel-strong">
        <div class="panel-inner">
          <h2 class="section-title">筛选条件</h2>
          <div class="field">
            <label for="category">Category</label>
            <select id="category">
              <option value="">全部类别</option>
              <option value="cpu">cpu</option>
              <option value="gpu">gpu</option>
              <option value="motherboard">motherboard</option>
              <option value="ram">ram</option>
              <option value="ssd">ssd</option>
              <option value="psu">psu</option>
              <option value="case">case</option>
              <option value="cooler">cooler</option>
            </select>
          </div>
          <div class="field">
            <label for="brand">Brand</label>
            <input id="brand" type="text" placeholder="例如 AMD / NVIDIA">
          </div>
          <div class="field">
            <label for="keyword">Keyword</label>
            <input id="keyword" type="text" placeholder="例如 7500F / RTX 4060">
          </div>
          <div class="field">
            <label for="enabled">Enabled</label>
            <select id="enabled">
              <option value="">全部</option>
              <option value="true">启用</option>
              <option value="false">停用</option>
            </select>
          </div>
          <button class="button primary" id="search-btn" type="button">查询词库</button>
          <div class="status" id="filter-status">页面会请求 `/api/v1/keyword-seeds`。如果接口还没实现，这里会显示错误信息。</div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-inner">
          <div class="table-header">
            <div>
              <h2 class="section-title">当前词条</h2>
              <p class="hint">列表页负责查看、筛选、启停和导出。文档中的字段都已经映射到这张表里。</p>
            </div>
            <div class="row-actions">
              <a class="button ghost small" href="/keywords/import">导入 Excel</a>
              <a class="button ghost small" href="/api/v1/keyword-seeds/export">导出 Excel</a>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Category</th>
                <th>Keyword</th>
                <th>Canonical</th>
                <th>Brand / Aliases</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="keyword-table">
              <tr>
                <td colspan="7" class="empty">等待加载词库数据。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const tableBody = document.getElementById('keyword-table');
    const statusEl = document.getElementById('filter-status');

    function encodeQuery(params) {
      const query = new URLSearchParams();
      Object.entries(params).forEach(([key, value]) => {
        if (value !== '' && value !== null && value !== undefined) {
          query.set(key, value);
        }
      });
      return query.toString();
    }

    function renderRows(items) {
      if (!items || items.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="7" class="empty">没有匹配到词条。</td></tr>';
        return;
      }
      tableBody.innerHTML = items.map((item) => {
        const aliases = (item.aliases || []).join(', ') || '—';
        const enabledLabel = item.enabled ? '启用' : '停用';
        const nextAction = item.enabled ? 'disable' : 'enable';
        const nextLabel = item.enabled ? '停用' : '启用';
        return `
          <tr>
            <td><span class="chip">${item.category || '—'}</span></td>
            <td>
              <div>${item.keyword || '—'}</div>
              <div class="mono">${item.id || ''}</div>
            </td>
            <td>${item.canonical_model || '—'}</td>
            <td>
              <div>${item.brand || '—'}</div>
              <div class="hint">${aliases}</div>
            </td>
            <td>${item.priority ?? '—'}</td>
            <td>${enabledLabel}</td>
            <td>
              <div class="row-actions">
                <a class="button ghost small" href="/keywords/${item.id}/edit">编辑</a>
                <button class="button ghost small" type="button" onclick="toggleSeed('${item.id}', '${nextAction}')">${nextLabel}</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function loadSeeds() {
      const params = {
        category: document.getElementById('category').value,
        brand: document.getElementById('brand').value.trim(),
        keyword: document.getElementById('keyword').value.trim(),
        enabled: document.getElementById('enabled').value,
        page: 1,
        page_size: 20,
      };
      statusEl.textContent = '正在加载词库...';
      try {
        const res = await fetch(`/api/v1/keyword-seeds?${encodeQuery(params)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '加载词库失败');
        renderRows(data.items || []);
        statusEl.textContent = `已加载 ${data.items?.length || 0} 条词条。`;
      } catch (error) {
        tableBody.innerHTML = '<tr><td colspan="7" class="empty">当前接口未返回可用数据。</td></tr>';
        statusEl.textContent = error.message;
      }
    }

    async function toggleSeed(id, action) {
      try {
        const res = await fetch(`/api/v1/keyword-seeds/${id}/${action}`, { method: 'POST' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `${action} failed`);
        await loadSeeds();
      } catch (error) {
        statusEl.textContent = error.message;
      }
    }

    document.getElementById('search-btn').addEventListener('click', loadSeeds);
    window.toggleSeed = toggleSeed;
    loadSeeds();
  </script>
</body>
</html>
