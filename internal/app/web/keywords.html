<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>givezj8.cn · 后台词库列表</title>
  <style>
    body { margin:0; min-height:100vh; font-family:"Avenir Next","PingFang SC",sans-serif; background:#f5f7fb; color:#172028; }
    .shell { max-width:1220px; margin:0 auto; padding:28px 20px 64px; }
    .toolbar, .filters, .table-card { display:grid; gap:16px; }
    .toolbar { grid-template-columns: 1fr auto; align-items:center; }
    .links { display:flex; gap:10px; flex-wrap:wrap; }
    .link, button, input, select {
      font:inherit; padding:12px 14px; border-radius:14px; border:1px solid rgba(23,32,40,0.12);
      background:#fff; color:#22303a;
    }
    button { cursor:pointer; }
    .primary { background:#0a6c52; color:#fff; border:0; }
    .filters { grid-template-columns: repeat(4, 1fr) auto; margin-top:18px; }
    .table-card { background:#fff; border:1px solid rgba(23,32,40,0.08); border-radius:24px; padding:22px; box-shadow:0 18px 40px rgba(23,32,40,0.08); margin-top:18px; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:14px 0; border-top:1px solid rgba(23,32,40,0.08); vertical-align:top; }
    thead th { border-top:0; color:#6a7783; font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .muted { color:#6a7783; }
    @media (max-width: 980px) {
      .toolbar, .filters { grid-template-columns: 1fr; }
      table, thead, tbody, tr, th, td { display:block; }
      thead { display:none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div>
        <div class="muted">givezj8.cn / admin</div>
        <h1 style="margin:8px 0 0; font-size:52px; letter-spacing:-.05em;">词库列表</h1>
      </div>
      <div class="links">
        <a class="link" href="/admin">后台首页</a>
        <a class="link" href="/admin/keywords/new">新增词条</a>
        <a class="link" href="/admin/keywords/import">Excel 导入</a>
        <a class="link" href="/admin/api/v1/keyword-seeds/export">导出 Excel</a>
      </div>
    </div>

    <div class="filters">
      <select id="category">
        <option value="">全部类别</option>
        <option value="cpu">cpu</option>
        <option value="gpu">gpu</option>
        <option value="motherboard">motherboard</option>
        <option value="ram">ram</option>
        <option value="ssd">ssd</option>
        <option value="psu">psu</option>
        <option value="case">case</option>
        <option value="cooler">cooler</option>
      </select>
      <input id="brand" placeholder="品牌">
      <input id="keyword" placeholder="关键词">
      <select id="enabled">
        <option value="">启用状态</option>
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
      <button class="primary" id="reload-btn" type="button">刷新</button>
    </div>

    <section class="table-card">
      <p id="status" class="muted">读取中</p>
      <table>
        <thead>
          <tr>
            <th>ID</th><th>类别</th><th>关键词</th><th>标准型号</th><th>品牌</th><th>状态</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </div>
  <script>
    async function loadSeeds() {
      const query = new URLSearchParams();
      ['category', 'brand', 'keyword', 'enabled'].forEach((id) => {
        const value = document.getElementById(id).value.trim();
        if (value) query.set(id, value);
      });
      const res = await fetch(`/admin/api/v1/keyword-seeds?${query.toString()}`);
      if (!res.ok) {
        document.getElementById('status').textContent = '读取词库失败';
        return;
      }
      const data = await res.json();
      document.getElementById('status').textContent = `共 ${data.total || 0} 条`;
      const rows = document.getElementById('rows');
      rows.innerHTML = '';
      (data.items || []).forEach((item) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.id}</td>
          <td>${item.category}</td>
          <td>${item.keyword}</td>
          <td>${item.canonical_model}</td>
          <td>${item.brand || '-'}</td>
          <td>${item.enabled}</td>
          <td>
            <div class="actions">
              <a class="link" href="/admin/keywords/${item.id}/edit">编辑</a>
              <button type="button" data-id="${item.id}" data-enabled="${item.enabled}">
                ${item.enabled ? '停用' : '启用'}
              </button>
            </div>
          </td>
        `;
        rows.appendChild(tr);
      });
      rows.querySelectorAll('button[data-id]').forEach((button) => {
        button.addEventListener('click', async () => {
          const id = button.getAttribute('data-id');
          const enabled = button.getAttribute('data-enabled') === 'true';
          await fetch(`/admin/api/v1/keyword-seeds/${id}/${enabled ? 'disable' : 'enable'}`, { method: 'POST' });
          loadSeeds();
        });
      });
    }
    document.getElementById('reload-btn').addEventListener('click', loadSeeds);
    loadSeeds();
  </script>
</body>
</html>
