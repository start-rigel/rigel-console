<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rigel Console</title>
  <style>
    :root {
      --paper: #f6f0e4;
      --ink: #182126;
      --accent: #c04f2d;
      --accent-soft: #f3b596;
      --panel: rgba(255,255,255,0.78);
      --line: rgba(24,33,38,0.12);
      --shadow: 0 20px 50px rgba(24,33,38,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Songti SC", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(192,79,45,0.18), transparent 35%),
        linear-gradient(135deg, #efe4cf, var(--paper));
      min-height: 100vh;
    }
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      align-items: start;
      margin-bottom: 28px;
    }
    .title {
      font-size: clamp(40px, 9vw, 88px);
      line-height: 0.92;
      margin: 0;
      letter-spacing: -0.04em;
    }
    .subtitle {
      max-width: 520px;
      font-size: 18px;
      line-height: 1.6;
      opacity: 0.8;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .form-panel { padding: 22px; }
    .metrics { display: grid; gap: 14px; padding: 22px; }
    .metric { border-top: 1px solid var(--line); padding-top: 12px; }
    .metric:first-child { border-top: 0; padding-top: 0; }
    .metric strong { display: block; font-size: 28px; }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
    input, select, button {
      font: inherit;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 14px 16px;
      background: rgba(255,255,255,0.75);
      color: var(--ink);
    }
    button {
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease;
    }
    button:hover { transform: translateY(-1px); background: #0f1619; }
    .results {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .card { padding: 22px; }
    .card h2, .card h3 { margin: 0 0 12px; }
    .item-list { display: grid; gap: 10px; }
    .item {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 14px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .item:first-child { border-top: 0; }
    .pill {
      display: inline-block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
    }
    .warning { color: var(--accent); }
    .alt-list, .advice-list { display: grid; gap: 8px; padding-left: 18px; }
    .admin-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .admin-links a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
    .empty { opacity: 0.65; }
    @media (max-width: 860px) {
      .hero, .result-grid { grid-template-columns: 1fr; }
      .item { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="panel form-panel">
        <p class="pill">Rigel Console</p>
        <h1 class="title">PC Build<br>Navigator</h1>
        <p class="subtitle">输入预算、用途和模式，Console 会先拉取 build-engine 的聚合价格目录，再调用 ai-advisor 生成一份可读的采购草案。</p>
        <form id="build-form">
          <label>预算
            <input id="budget" type="number" min="1000" step="100" value="6000" required>
          </label>
          <label>用途
            <select id="use_case">
              <option value="gaming">gaming</option>
              <option value="office">office</option>
              <option value="design">design</option>
            </select>
          </label>
          <label>模式
            <select id="build_mode">
              <option value="new_only">new_only</option>
              <option value="mixed">mixed</option>
              <option value="used_only">used_only</option>
            </select>
          </label>
          <button type="submit">Generate Recommendation</button>
        </form>
      </div>
      <div class="panel metrics">
        <div class="metric"><span class="pill">API</span><strong>POST /catalog/recommend</strong><span>应用层会自动聚合价格目录与 AI 推荐草案。</span></div>
        <div class="metric"><span class="pill">Admin</span><strong>占位后台</strong><span>商品管理、配件管理、任务状态先以轻量入口保留。</span></div>
        <div class="admin-links">
          <a href="/admin/products">商品管理</a>
          <a href="/admin/parts">配件管理</a>
          <a href="/admin/jobs">任务状态</a>
        </div>
      </div>
    </section>
    <section class="results" id="results">
      <div class="panel card empty">结果会显示在这里。</div>
    </section>
  </div>
  <script>
    const form = document.getElementById('build-form');
    const results = document.getElementById('results');

    function renderCatalog(response) {
      const items = (response.selection?.selected_items || []).map(item => `
        <div class="item">
          <strong>${item.category}</strong>
          <div>
            <div>${item.display_name}</div>
            <small>${(item.source_platforms || []).join(', ') || 'catalog'}${item.reasons?.length ? ' · ' + item.reasons[0] : ''}</small>
          </div>
          <div>¥${Math.round(item.selected_price || 0)}</div>
        </div>
      `).join('');

      const warnings = ([...(response.catalog_warnings || []), ...((response.selection && response.selection.warnings) || [])]).map(w => `<li class="warning">${w}</li>`).join('') || '<li>当前没有额外警告。</li>';
      const advice = response.advice ? `
        <div class="panel card">
          <h3>AI Advice</h3>
          <p>${response.advice.summary}</p>
          <ul class="advice-list">${response.advice.reasons.map(item => `<li>${item}</li>`).join('')}</ul>
          <p><strong>Upgrade:</strong> ${(response.advice.upgrade_advice || []).join(' ')}</p>
          <p><strong>Alternative:</strong> ${response.advice.alternative_note || '暂无。'}</p>
        </div>
      ` : '<div class="panel card"><h3>AI Advice</h3><p class="empty">当前未返回解释。</p></div>';

      results.innerHTML = `
        <div class="result-grid">
          <div class="panel card">
            <h2>Catalog Recommendation</h2>
            <p><strong>Estimated Total:</strong> ¥${Math.round(response.selection?.estimated_total || 0)}</p>
            <p><strong>Catalog Items:</strong> ${response.catalog_item_count || 0}</p>
            <div class="item-list">${items}</div>
          </div>
          <div>
            <div class="panel card">
              <h3>Warnings</h3>
              <ul class="advice-list">${warnings}</ul>
            </div>
            ${advice}
          </div>
        </div>
      `;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      results.innerHTML = '<div class="panel card">生成中，请稍等...</div>';
      const payload = {
        budget: Number(document.getElementById('budget').value),
        use_case: document.getElementById('use_case').value,
        build_mode: document.getElementById('build_mode').value,
      };
      try {
        const res = await fetch('/catalog/recommend', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'request failed');
        renderCatalog(data);
      } catch (error) {
        results.innerHTML = `<div class="panel card warning">${error.message}</div>`;
      }
    });
  </script>
</body>
</html>
