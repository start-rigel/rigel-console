<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>givezj8.cn · 匿名装机推荐</title>
  <style>
    :root {
      --bg: #eef3f0;
      --card: rgba(255, 255, 255, 0.88);
      --ink: #102127;
      --muted: #5c7076;
      --line: rgba(16, 33, 39, 0.12);
      --accent: #0f8f6c;
      --accent-dark: #0a6c52;
      --warn: #b96816;
      --shadow: 0 24px 48px rgba(16, 33, 39, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 143, 108, 0.18), transparent 24%),
        linear-gradient(180deg, #f8fbfa, var(--bg));
    }
    a { color: inherit; text-decoration: none; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 28px 20px 64px; }
    .topbar, .hero, .results { display: grid; gap: 20px; }
    .topbar { grid-template-columns: 1fr auto; align-items: center; }
    .tag, .status-pill, .action-link {
      display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px;
      border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,0.74);
    }
    .action-link { color: var(--muted); }
    .hero { grid-template-columns: 1.1fr 0.9fr; margin-top: 20px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 24px;
    }
    h1 { margin: 0; font-size: clamp(42px, 7vw, 78px); line-height: .92; letter-spacing: -.05em; }
    p { color: var(--muted); line-height: 1.7; }
    form { display: grid; gap: 14px; margin-top: 22px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { display: grid; gap: 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
    input, select, textarea, button {
      width: 100%; font: inherit; color: var(--ink); padding: 14px 16px;
      border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92);
    }
    textarea { min-height: 110px; resize: vertical; }
    button {
      border: 0; color: #fff; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
    }
    .result-list { display: grid; gap: 12px; margin-top: 14px; }
    .result-item {
      display: grid; grid-template-columns: 92px 1fr auto; gap: 14px; align-items: start;
      padding-top: 14px; border-top: 1px solid var(--line);
    }
    .result-item:first-child { border-top: 0; padding-top: 0; }
    .chip {
      display: inline-flex; justify-content: center; align-items: center; padding: 6px 10px;
      border-radius: 999px; background: rgba(15, 143, 108, 0.12); color: var(--accent-dark);
      font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    }
    .metric strong { display: block; font-size: 34px; letter-spacing: -.04em; margin-top: 8px; }
    .muted { color: var(--muted); }
    .warning { color: var(--warn); }
    .summary { margin-top: 8px; padding-top: 12px; border-top: 1px solid var(--line); }
    pre {
      margin: 0; white-space: pre-wrap; word-break: break-word; font-family: "SFMono-Regular", Menlo, monospace;
      font-size: 12px; color: var(--muted);
    }
    @media (max-width: 900px) {
      .topbar, .hero { grid-template-columns: 1fr; }
      .grid-2, .result-item { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <span class="tag">givezj8.cn</span>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <span class="status-pill" id="anonymous-status">匿名会话初始化中</span>
        <a class="action-link" href="/admin/login">后台管理</a>
      </div>
    </div>

    <div class="hero">
      <section class="card">
        <span class="tag">匿名直接使用</span>
        <h1>给不懂配置的人，直接出一版能买的草案。</h1>
        <p>前台不需要登录。系统会先命中价格目录和推荐缓存，只有需要新结果时才会触发一次新的 AI 生成。</p>

        <form id="recommend-form">
          <div class="grid-2">
            <label>预算
              <input id="budget" type="number" min="1000" step="100" value="6000" required>
            </label>
            <label>用途
              <select id="use_case">
                <option value="gaming">gaming</option>
                <option value="productivity">productivity</option>
                <option value="balanced">balanced</option>
              </select>
            </label>
          </div>
          <div class="grid-2">
            <label>装机模式
              <select id="build_mode">
                <option value="mixed">mixed</option>
                <option value="new_only">new_only</option>
                <option value="used_only">used_only</option>
              </select>
            </label>
            <label>CPU / GPU 偏好
              <input id="brand_preferences" placeholder="如 amd,nvidia">
            </label>
          </div>
          <label>特殊要求
            <input id="special_requirements" placeholder="如 wifi_motherboard,low_noise">
          </label>
          <label>补充说明
            <textarea id="notes" placeholder="例如：1080p 游戏为主，希望价格稳一点。"></textarea>
          </label>
          <button type="submit">生成推荐</button>
        </form>
      </section>

      <aside class="card">
        <div class="metric">
          <span class="muted">剩余匿名 AI 次数</span>
          <strong id="remaining">-</strong>
        </div>
        <div class="metric" style="margin-top:18px;">
          <span class="muted">冷却状态</span>
          <strong id="cooldown">0 秒</strong>
        </div>
        <div class="metric" style="margin-top:18px;">
          <span class="muted">最近状态</span>
          <strong id="request-status">等待请求</strong>
        </div>
        <div class="summary">
          <p id="summary-text">首页会先静默获取匿名会话，再提交推荐请求。相同参数优先命中缓存，不重复消耗 AI 调用。</p>
        </div>
      </aside>
    </div>

    <div class="results">
      <section class="card">
        <h2 style="margin:0;">推荐结果</h2>
        <p id="result-meta">还没有生成结果。</p>
        <div id="selected-items" class="result-list"></div>
      </section>

      <section class="card">
        <h2 style="margin:0;">建议摘要</h2>
        <p id="advice-summary">等待推荐结果。</p>
        <div class="summary">
          <pre id="advice-detail">{}</pre>
        </div>
      </section>
    </div>
  </div>

  <script>
    let anonymousId = '';

    async function ensureSession() {
      const res = await fetch('/api/v1/session/anonymous');
      const data = await res.json();
      anonymousId = data.anonymous_id || '';
      document.getElementById('anonymous-status').textContent = anonymousId ? `匿名会话 ${anonymousId}` : '匿名会话获取失败';
      document.getElementById('remaining').textContent = String(data.remaining_ai_requests ?? '-');
      document.getElementById('cooldown').textContent = `${data.cooldown_seconds ?? 0} 秒`;
    }

    function renderItems(items) {
      const container = document.getElementById('selected-items');
      container.innerHTML = '';
      if (!Array.isArray(items) || items.length === 0) {
        container.innerHTML = '<p class="muted">当前没有选中任何配件。</p>';
        return;
      }
      items.forEach((item) => {
        const node = document.createElement('div');
        node.className = 'result-item';
        node.innerHTML = `
          <span class="chip">${item.category || '-'}</span>
          <div>
            <strong>${item.display_name || '-'}</strong>
            <div class="muted">${(item.reasons || []).join(' / ') || '暂无说明'}</div>
          </div>
          <strong>￥${item.selected_price || 0}</strong>
        `;
        container.appendChild(node);
      });
    }

    document.getElementById('recommend-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const brands = (document.getElementById('brand_preferences').value || '').split(',');
      const payload = {
        budget: Number(document.getElementById('budget').value),
        use_case: document.getElementById('use_case').value,
        build_mode: document.getElementById('build_mode').value,
        brand_preference: {
          cpu: (brands[0] || '').trim(),
          gpu: (brands[1] || '').trim()
        },
        special_requirements: (document.getElementById('special_requirements').value || '')
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean),
        notes: document.getElementById('notes').value.trim()
      };

      document.getElementById('request-status').textContent = '请求中';
      const res = await fetch('/catalog/recommend', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Anonymous-Id': anonymousId
        },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        const cooldown = data?.error?.cooldown_seconds ?? 0;
        document.getElementById('request-status').textContent = data?.error?.message || '请求失败';
        document.getElementById('cooldown').textContent = `${cooldown} 秒`;
        return;
      }

      const requestStatus = data.request_status || {};
      document.getElementById('remaining').textContent = String(requestStatus.remaining_ai_requests ?? '-');
      document.getElementById('cooldown').textContent = `${requestStatus.cooldown_seconds ?? 0} 秒`;
      document.getElementById('request-status').textContent = requestStatus.cache_hit ? '已命中缓存' : '已生成新结果';
      document.getElementById('summary-text').textContent = (data.catalog_warnings || []).join('；') || '价格目录已返回，可继续调整需求后再次生成。';
      document.getElementById('result-meta').textContent = `目录条目 ${data.catalog_item_count || 0}，估算总价 ￥${data.selection?.estimated_total || 0}`;
      document.getElementById('advice-summary').textContent = data.advice?.summary || '暂无建议摘要';
      document.getElementById('advice-detail').textContent = JSON.stringify(data.advice || {}, null, 2);
      renderItems(data.selection?.selected_items || []);
    });

    ensureSession().catch(() => {
      document.getElementById('anonymous-status').textContent = '匿名会话初始化失败';
    });
  </script>
</body>
</html>
